<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MovieFish</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --cab1:#5B3A21; --cab2:#3F2716; --cab-edge:#2A190D;
    --knob1:#D9C7A6; --knob2:#9C8458; --knob-edge:#4A3C24;
    --screen:#0C140E; --speaker:#241912;
    --phos:#7DF49A; --phos-dim:#3E8C56; --amber:#F2C14E; --rose:#FF7A6B;
    --ink:#DFF5E4; --dim:#6F9C7C; --faint:#456B52;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:linear-gradient(160deg,var(--cab1),var(--cab2));
    color:var(--ink);font-family:'Space Grotesk',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;overflow:hidden;
  }
  /* the whole viewport is the cabinet; wood-grain veil over it */
  body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
    background:repeating-linear-gradient(96deg,rgba(0,0,0,.05) 0 3px,transparent 3px 10px);opacity:.5}

  /* cabinet = full screen, with the set laid out as screen | controls */
  .set{position:fixed;inset:0;z-index:1;display:grid;
    grid-template-columns:1fr 120px;gap:18px;padding:20px;
    box-shadow:inset 0 3px 4px rgba(255,220,170,.22), inset 0 -6px 16px rgba(0,0,0,.45);}

  /* screen bezel fills the left region */
  .bezel{background:radial-gradient(120% 120% at 50% 42%,#1B130C,#0E0A06);
    border-radius:42px;padding:22px;min-height:0;
    box-shadow:inset 0 0 0 2px #0A0805, inset 0 8px 26px rgba(0,0,0,.75),
      inset 0 -4px 12px rgba(0,0,0,.5)}
  .screen{height:100%;position:relative;overflow:hidden;padding:26px 30px;
    display:flex;flex-direction:column;
    /* the bulge: tight, rounded corners that pull the rectangle toward a dome */
    border-radius:46px/64px;
    background:
      radial-gradient(130% 120% at 50% 38%, #11381F 0%, #0C140E 72%, #070C09 100%);
    box-shadow:
      inset 0 0 120px rgba(0,0,0,.78),
      inset 0 0 26px rgba(125,244,154,.07);
  }
  /* convex curvature: a soft barrel via a scaled pseudo-overlay highlight */
  .screen{transform:perspective(1400px)}
  .screen::before{content:"";position:absolute;inset:0;pointer-events:none;z-index:5;
    border-radius:46px/64px;
    background:repeating-linear-gradient(to bottom,transparent 0 2px,rgba(0,0,0,.20) 2px 4px);opacity:.5}
  /* glass dome: bright reflection top-left, deep edge vignette = convex read */
  .screen::after{content:"";position:absolute;inset:0;pointer-events:none;z-index:8;border-radius:46px/64px;
    background:
      radial-gradient(80% 55% at 30% 18%, rgba(190,255,210,.10) 0%, transparent 55%),
      radial-gradient(150% 130% at 50% 50%, transparent 58%, rgba(0,0,0,.5) 100%);
    box-shadow:inset 0 0 60px rgba(0,0,0,.55)}
  @media(prefers-reduced-motion:reduce){.screen::before{display:none}}

  .osd{display:flex;justify-content:space-between;align-items:center;flex-shrink:0;
    border-bottom:1px solid var(--phos-dim);padding-bottom:9px;margin-bottom:4px;position:relative;z-index:7}
  .osd .br{font-family:'Space Grotesk';font-weight:700;font-size:18px;letter-spacing:.01em;color:var(--ink)}
  .osd .br b{color:var(--phos)}
  .osd .ch{font-family:'DM Mono';font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--phos)}
  .osd .live{font-family:'DM Mono';font-size:9px;letter-spacing:.1em;color:var(--dim)}
  .osd .live b{color:var(--phos)}
  .osd .right{display:flex;flex-direction:column;align-items:flex-end;gap:2px}

  .feed{position:relative;z-index:7;flex:1;overflow-y:auto;scrollbar-width:thin;
    scrollbar-color:var(--phos-dim) transparent;padding-right:4px}
  .feed::-webkit-scrollbar{width:6px}
  .feed::-webkit-scrollbar-thumb{background:var(--phos-dim);border-radius:3px}

  .row{padding:11px 2px 13px;border-bottom:1px dashed rgba(125,244,154,.16)}
  .row:last-child{border-bottom:none}
  .rtop{display:flex;align-items:baseline;gap:9px;margin-bottom:9px}
  .rtop .gr{font-family:'Space Grotesk';font-weight:700;font-size:17px;color:var(--phos);
    text-shadow:0 0 8px rgba(125,244,154,.5);min-width:30px}
  .rtop .gr.warn{color:var(--amber);text-shadow:0 0 8px rgba(242,193,78,.5)}
  .rtop .nm{font-family:'Space Grotesk';font-weight:600;font-size:16px;color:var(--ink);flex:1;min-width:0;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .rtop .sp{font-family:'DM Mono';font-size:9px;letter-spacing:.1em;text-transform:uppercase;
    color:var(--amber);border:1px solid var(--amber);border-radius:2px;padding:0 5px;white-space:nowrap}

  .scale{position:relative;height:74px;margin-left:38px;margin-right:6px;margin-top:30px;overflow:visible}
  .track{position:absolute;left:0;right:0;top:56px;height:3px;background:rgba(125,244,154,.18);border-radius:2px}
  .band{position:absolute;top:55.5px;height:4px;border-radius:2px;background:rgba(125,244,154,.34)}
  .band.warn{background:rgba(242,193,78,.4)}
  .mk{position:absolute;top:56px;transform:translateY(calc(-1 * var(--dy,0px)))}
  /* .ico (logo only) dodges sideways without moving the pin or its number */
  .mk .ico{position:absolute;top:-30px;left:0;transform:translateX(calc(-50% + var(--dx,0px)))}
  /* connector from a lifted marker down to the track */
  .mk .stem{position:absolute;left:-0.5px;top:-6px;width:1px;background:rgba(125,244,154,.3)}
  .mk .ico img{width:14px;height:14px;border-radius:2px;display:block}
  .mk .ico img.rnd{border-radius:50%}
  .mk .ico .em{width:14px;height:14px;line-height:14px;font-size:11px;text-align:center;display:block}
  .mk .pin{position:absolute;left:-1px;top:-4px;width:2px;height:9px;background:var(--phos);opacity:.7;
    transform:translate(var(--px,0px), var(--dy,0px))}
  /* number rides under its logo (both lift together on stagger), clear of track */
  .mk .lb{position:absolute;left:0;top:-14px;transform:translateX(calc(-50% + var(--lx,0px)));
    font-family:'DM Mono';font-weight:500;font-size:9px;color:var(--ink);line-height:1}
  .comp{position:absolute;border-left:5px solid transparent;border-right:5px solid transparent;
    border-top:8px solid var(--phos);filter:drop-shadow(0 0 5px rgba(125,244,154,.8));margin-left:-5px;z-index:5}
  /* stem connecting the composite arrow down to the track */
  .compstem{position:absolute;width:1px;background:rgba(125,244,154,.45);margin-left:0;z-index:3}
  .compnum{position:absolute;transform:translateX(-50%);
    font-family:'Space Grotesk';font-weight:700;font-size:13px;color:var(--phos);
    text-shadow:0 0 7px rgba(125,244,154,.7);white-space:nowrap;z-index:5}
  .ends{position:absolute;top:64px;font-family:'DM Mono';font-size:8px;color:var(--faint)}

  .bz{display:flex;align-items:center;gap:8px;margin:9px 0 0 38px}
  .bz .l{font-family:'DM Mono';font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint)}
  .bz .seg{flex:0 0 120px;height:5px;border-radius:3px;display:flex;overflow:hidden;border:1px solid rgba(125,244,154,.2)}
  .bz .seg i{height:100%}
  .bz .t{font-family:'DM Mono';font-size:9px;color:var(--dim)}

  /* control column pinned to the cabinet's right edge */
  .panel{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;
    position:relative;z-index:2;overflow-y:auto}
  .brandtag{font-family:'DM Mono';font-size:8px;letter-spacing:.16em;color:#C9A86E;text-align:center;
    border:1px solid #7A5B33;border-radius:3px;padding:3px 5px;text-transform:uppercase}
  .kwrap{display:flex;flex-direction:column;align-items:center;gap:5px}
  .knob{width:56px;height:56px;border-radius:50%;cursor:pointer;position:relative;
    background:radial-gradient(circle at 38% 32%,var(--knob1),var(--knob2) 70%,var(--knob-edge));
    box-shadow:0 3px 6px rgba(0,0,0,.5), inset 0 1px 2px rgba(255,255,255,.4);
    border:2px solid var(--knob-edge);transition:transform .12s}
  .knob::after{content:"";position:absolute;left:50%;top:7px;width:3px;height:17px;border-radius:2px;
    background:#3A2C16;transform:translateX(-50%)}
  .knob:hover{transform:scale(1.05)}
  .knob.on{box-shadow:0 0 16px rgba(125,244,154,.55),0 3px 6px rgba(0,0,0,.5),inset 0 1px 2px rgba(255,255,255,.4)}
  .knob.on::after{background:#1E6B38}
  .knob:focus-visible{outline:2px solid var(--phos);outline-offset:3px}
  .klabel{font-family:'DM Mono';font-size:8px;letter-spacing:.05em;text-transform:uppercase;
    color:#C9A86E;text-align:center;max-width:84px;line-height:1.3}
  .speaker{width:60px;height:70px;border-radius:6px;background:var(--speaker);
    background-image:radial-gradient(circle,#000 1px,transparent 1.4px);background-size:8px 8px;
    box-shadow:inset 0 2px 6px rgba(0,0,0,.6)}

  /* footer/legend live as a thin OSD strip pinned to screen bottom */
  .ticker{flex-shrink:0;position:relative;z-index:7;border-top:1px solid var(--phos-dim);
    margin-top:4px;padding-top:7px;display:flex;flex-wrap:wrap;gap:5px 12px;align-items:center;
    font-family:'DM Mono';font-size:9px;letter-spacing:.03em;color:var(--dim)}
  .ticker img{width:11px;height:11px;border-radius:2px;vertical-align:-2px;margin-right:3px}
  .ticker img.rnd{border-radius:50%}
  .ticker .em{margin-right:3px}

  @media(max-width:720px){
    .set{grid-template-columns:1fr;grid-template-rows:1fr auto;gap:14px;padding:12px}
    .panel{flex-direction:row;flex-wrap:wrap;gap:12px}
    .panel .brandtag,.panel .speaker{display:none}
    .klabel{max-width:64px}
  }
  @media(prefers-reduced-motion:no-preference){
    .row{animation:warmup .4s ease both}
    @keyframes warmup{from{opacity:0}to{opacity:1}}
  }
</style>
</head>
<body>
<div class="set">
  <div class="bezel">
    <div class="screen">
      <div class="osd">
        <span class="br">Movie<b>Fish</b></span>
        <div class="right">
          <span class="ch">CH 01 &middot; NOW SHOWING</span>
          <span class="live" id="osd-live"></span>
        </div>
      </div>
      <div class="feed" id="feed"></div>
      <div class="ticker" id="ticker"></div>
    </div>
  </div>

  <div class="panel">
    <div class="brandtag">Movie&middot;Fish</div>
    <div class="kwrap">
      <button class="knob on" data-sort="composite" aria-label="Sort by rating"></button>
      <span class="klabel">Top Rated</span>
    </div>
    <div class="kwrap">
      <button class="knob" data-sort="spread" aria-label="Sort by disagreement"></button>
      <span class="klabel">Split Decision</span>
    </div>
    <div class="kwrap">
      <button class="knob" data-sort="buzz" aria-label="Sort by buzz"></button>
      <span class="klabel">Loudest</span>
    </div>
    <div class="speaker"></div>
  </div>
</div>

<script>
const DATA = /*__DATA__*/;

const SOURCES = {
  rotten_tomatoes:{name:"Tomatometer",domain:"rottentomatoes.com",abbr:"RT"},
  rt_audience:{name:"Popcornmeter",domain:"rottentomatoes.com",abbr:"RT-A",icon:"\u{1F37F}"},
  metacritic:{name:"Metacritic",domain:"metacritic.com",abbr:"MC",round:true},
  imdb:{name:"IMDb",domain:"imdb.com",abbr:"IMDb"},
  letterboxd:{name:"Letterboxd",domain:"letterboxd.com",abbr:"LBXD"},
  tmdb:{name:"TMDB",domain:"themoviedb.org",abbr:"TMDB"}
};
const ORDER = ["rotten_tomatoes","rt_audience","metacritic","imdb","letterboxd","tmdb"];
const favicon = d => `https://www.google.com/s2/favicons?domain=${d}&sz=64`;
const fmt = n => n>=1000 ? n.toLocaleString('en-US') : String(n);

function grade(c){
  if(c==null) return "\u2013";
  if(c>=93)return"A+";if(c>=88)return"A";if(c>=83)return"A-";if(c>=78)return"B+";
  if(c>=73)return"B";if(c>=68)return"B-";if(c>=63)return"C+";if(c>=58)return"C";
  if(c>=53)return"C-";if(c>=48)return"D+";if(c>=43)return"D";if(c>=38)return"D-";return"F";
}

document.getElementById('osd-live').innerHTML = DATA.sample
  ? 'PREVIEW' : 'UPD <b>'+DATA.generated_at+'</b>';

document.getElementById('ticker').innerHTML =
  ORDER.map(k=>{const s=SOURCES[k];return `<span>${s.icon?`<span class="em">${s.icon}</span>`:`<img class="${s.round?'rnd':''}" src="${favicon(s.domain)}" alt="">`}${s.name}</span>`}).join('')
  + `<span style="color:var(--faint)">\u25B2 grade</span>`;

function bar(m){
  const present = ORDER.filter(k=>m.sources[k]!=null);
  if(!present.length) return '<div class="scale"></div>';
  const vals = present.map(k=>m.sources[k]);
  const lo = Math.min(...vals), hi = Math.max(...vals);
  let marks = present.map(k=>{
    const s=SOURCES[k], v=m.sources[k];
    const mk = s.icon
      ? `<span class="em">${s.icon}</span>`
      : `<img class="${s.round?'rnd':''}" src="${favicon(s.domain)}" alt="${s.name}">`;
    return `<div class="mk" data-v="${v}" style="left:${v}%" title="${s.name}: ${Math.round(v)}">
      <span class="ico">${mk}</span><span class="stem"></span><span class="pin"></span><span class="lb">${Math.round(v)}</span></div>`;
  }).join('');
  const comp = m.composite!=null
    ? `<div class="compnum" style="left:${m.composite}%">${Math.round(m.composite)}</div>
       <div class="comp" data-v="${m.composite}" style="left:${m.composite}%" title="Grade ${Math.round(m.composite)}"></div>
       <div class="compstem" style="left:${m.composite}%;height:30px"></div>` : '';
  return `<div class="scale">
    <div class="track"></div>
    <div class="band ${m.contested?'warn':''}" style="left:${lo}%;width:${Math.max(hi-lo,1)}%"></div>
    <span class="ends" style="left:0">0</span><span class="ends" style="right:0">100</span>
    ${marks}${comp}
  </div>`;
}

function buzzLine(m){
  if(!m.buzz) return '';
  const b=m.buzz;
  return `<div class="bz">
    <span class="l">Buzz</span>
    <div class="seg" title="${b.pos}% excited \u00b7 ${b.neu}% neutral \u00b7 ${b.neg}% negative">
      <i style="width:${b.pos}%;background:var(--phos)"></i>
      <i style="width:${b.neu}%;background:#2C5C3C"></i>
      <i style="width:${b.neg}%;background:var(--rose)"></i>
    </div>
    <span class="t">${b.pos}% excited \u00b7 ${fmt(b.total)}</span>
  </div>`;
}

function rowHTML(m){
  return `<div class="row">
    <div class="rtop">
      <span class="gr ${m.contested?'warn':''}">${grade(m.composite)}</span>
      <span class="nm">${m.title}</span>
      ${m.contested?`<span class="sp">Split ${Math.round(m.spread)}</span>`:''}
    </div>
    ${bar(m)}
    ${buzzLine(m)}
  </div>`;
}

let current='composite';
function dodge(scale){
  const W=scale.clientWidth||300;
  const STEP=30, NEAR=24, TIE_GAP=18, TRACK=56, LOGO_TOP=26, COMPNUM_TOP=0, COMP_ARROW_TOP=18;

  // ---- 1. source markers: stair tiers (rounded ties share a tier) ----
  const mks=[...scale.querySelectorAll('.mk')];
  const items=mks.map(el=>({
    el, v:parseFloat(el.dataset.v),
    x:(parseFloat(el.style.left)/100)*W, dx:0, tier:0
  })).sort((a,b)=>a.x-b.x);

  let tier=0,lastX=-1e9,lastR=null;
  for(const it of items){
    const r=Math.round(it.v);
    if(lastR!==null && r===lastR){ it.tier=tier; }
    else if(it.x-lastX < NEAR){ tier++; it.tier=tier; }
    else { tier=0; it.tier=0; }
    lastX=it.x; lastR=r;
  }

  // ties: spread the LOGOS apart, but show the shared number ONCE (centered)
  const groups={};
  for(const it of items){ const r=Math.round(it.v); (groups[r]=groups[r]||[]).push(it); }
  for(const r in groups){
    const g=groups[r];
    if(g.length<2) continue;
    const cx=g.reduce((a,it)=>a+it.x,0)/g.length;
    g.forEach((it,i)=>{
      it.dx=(cx + (i-(g.length-1)/2)*TIE_GAP) - it.x;  // logo dodge
      const lb=it.el.querySelector('.lb'), pin=it.el.querySelector('.pin');
      if(i===0){
        if(lb){ lb.style.display='block'; lb.style.setProperty('--lx',(cx-it.x).toFixed(1)+'px'); }
        if(pin){ pin.style.display='block'; pin.style.setProperty('--px',(cx-it.x).toFixed(1)+'px'); }
      } else {
        if(lb) lb.style.display='none';                 // one number per tie
        if(pin) pin.style.display='none';               // one tick per tie
      }
    });
  }

  let maxSourceTier=0;
  for(const it of items){
    maxSourceTier=Math.max(maxSourceTier,it.tier);
    const lift=it.tier*STEP;
    it.el.style.setProperty('--dy',lift+'px');
    it.el.querySelector('.ico')?.style.setProperty('--dx',it.dx.toFixed(1)+'px');
    const stem=it.el.querySelector('.stem'); if(stem) stem.style.height=(lift+6)+'px';
  }

  // ---- 2. composite ----
  const comp=scale.querySelector('.comp'),
        cnum=scale.querySelector('.compnum'),
        cstem=scale.querySelector('.compstem');
  let compLift=0;
  if(comp){
    const cv=parseFloat(comp.dataset.v), cr=Math.round(cv);
    // does the grade equal a source score? point the arrow at THAT logo, no line.
    let match=null, best=1e9;
    for(const it of items){
      if(Math.round(it.v)===cr){ const d=Math.abs(it.x-cv/100*W); if(d<best){best=d;match=it;} }
    }
    if(match){
      const effX=match.x+match.dx, lift=match.tier*STEP, logoTop=LOGO_TOP-lift;
      const pct=(effX/W*100);
      comp.style.left=pct+'%'; cnum.style.left=pct+'%';
      comp.style.top=(logoTop-12)+'px';        // arrow tip sits just above the logo
      cnum.style.top=(logoTop-12-14)+'px';     // grade number above the arrow
      cstem.style.display='none';              // <-- no connecting line in this case
      compLift=lift+26;
    } else {
      // grade is on its own: lift above any nearby source, draw stem to the track
      const cx=cv/100*W;
      let nearTier=-1;
      for(const it of items){ if(Math.abs(it.x-cx)<NEAR+8) nearTier=Math.max(nearTier,it.tier); }
      compLift=(nearTier+1)*STEP;
      cstem.style.display='block';
      comp.style.top =(COMP_ARROW_TOP - compLift)+'px';
      cnum.style.top =(COMPNUM_TOP   - compLift)+'px';
      cstem.style.top=(COMP_ARROW_TOP+8 - compLift)+'px';
      cstem.style.height=(TRACK-(COMP_ARROW_TOP+8)+compLift)+'px';
    }
  }

  // ---- 3. reserve headroom so lifted elements clear the row above ----
  const topMost=Math.min(LOGO_TOP-maxSourceTier*STEP, COMPNUM_TOP-compLift);
  scale.style.marginTop=(Math.max(0,-topMost)+14)+'px';
}

function render(){
  const movies=[...DATA.movies].sort((a,b)=>{
    if(current==='spread') return (b.spread??-1)-(a.spread??-1);
    if(current==='buzz')   return (b.buzz?.total??-1)-(a.buzz?.total??-1);
    return (b.composite??-1)-(a.composite??-1);
  });
  document.getElementById('feed').innerHTML = movies.map(rowHTML).join('');
  requestAnimationFrame(()=>document.querySelectorAll('.scale').forEach(dodge));
}

document.querySelectorAll('.knob').forEach(k=>{
  k.addEventListener('click',()=>{
    document.querySelectorAll('.knob').forEach(x=>x.classList.remove('on'));
    k.classList.add('on'); current=k.dataset.sort; render();
  });
});
render();
</script>
</body>
</html>
